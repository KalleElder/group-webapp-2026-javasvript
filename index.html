<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Träningsdagbok</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="background-glow glow-one"></div>
  <div class="background-glow glow-two"></div>

  <main class="app-shell">
    <header class="hero">
      <div class="hero-badge">Fitness Journal</div>
      <h1>Träningsdagbok</h1>
      <p class="hero-text">
        En modern och enkel plats för att logga dina träningspass.
      </p>
    </header>

    <section class="panel form-panel">
      <div class="panel-header">
        <h2>Lägg till träningspass</h2>
        <p>Skriv in ditt pass och bygg din träningshistorik.</p>
      </div>

      <div class="form-group">
        <label for="workout-input">Passnamn</label>
        <input id="workout-input" type="text" placeholder="Ex: Benpass, Löpning, Rygg & biceps">
      </div>

      <button id="add-btn" class="primary-btn">Lägg till pass</button>
    </section>

    <section class="panel list-panel">
      <div class="panel-header">
        <h2>Mina träningspass</h2>
        <p>Dina tillagda pass visas här.</p>
      </div>

      <ul id="workout-list" class="workout-list"></ul>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
